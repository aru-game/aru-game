<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>WHISKERS IN THE DARK - Episode 1</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Hiragino Mincho ProN', serif; overflow: hidden; }
        canvas { display: block; cursor: crosshair; }

        #escape-scene {
            position: absolute; inset: 0; display: none; z-index: 50; overflow: hidden;
            transform-origin: center center;
            transform: scale(1);
            transition: transform 1.5s ease-out;
            background: #000;
        }

        #shake-layer { width: 100%; height: 100%; transform-origin: center center; display: flex; align-items: center; justify-content: center; }
        
        #road-img { 
            width: 100vw; height: 100vh; object-fit: cover; object-position: center;
        }

        #cutscene-video { 
            position: absolute; inset: 0; width: 100%; height: 100%; 
            object-fit: cover; 
            opacity: 0; 
            display: none; pointer-events: none; 
            filter: brightness(1.2) contrast(1.2);
            transition: opacity 1.0s ease-in; 
        }

        .step-shake { animation: sway-walk 1.0s ease-in-out; }
        @keyframes sway-walk {
            0% { transform: rotate(0deg) translate(0, 0); }
            25% { transform: rotate(-3deg) translate(-40px, -5px); }
            75% { transform: rotate(3deg) translate(40px, -5px); }
            100% { transform: rotate(0deg) translate(0, 0); }
        }

        .violent-shake { animation: violent-shudder 0.07s infinite; }
        @keyframes violent-shudder {
            0% { transform: translate(0,0); }
            50% { transform: translate(35px, 30px); }
            100% { transform: translate(-35px, -30px); }
        }

        #start-screen { position: absolute; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; text-align: center; }
        #ui-layer { position: absolute; inset: 0; pointer-events: none; z-index: 1000; }
        #msg-box { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 700px; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.3); padding: 25px; pointer-events: auto; display: none; }
        #speaker { color: #ff4444; font-weight: bold; margin-bottom: 10px; font-size: 20px; }
        #text { font-size: 18px; line-height: 1.6; }
        .btn-ui { background: rgba(17, 17, 17, 0.9); color: #eee; border: 1px solid #666; padding: 12px 24px; cursor: pointer; margin: 10px 5px; font-family: inherit; }
        
        .end-screen { position: absolute; inset: 0; background: #000; opacity: 0; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 5000; transition: opacity 2s; }
        .end-text { font-size: 45px; letter-spacing: 12px; font-weight: bold; }
        #bad-text { color: #f00; text-shadow: 0 0 30px #f00; }
    </style>
</head>
<body>

<div id="start-screen" onclick="initGame()">
    <h1>WHISKERS IN THE DARK</h1>
    <p style="color: #888;">画面をクリックして開始</p>
</div>

<div id="escape-scene">
    <div id="shake-layer">
        <img id="road-img" src="Gemini_Generated_Image_6tdm766tdm766tdm.png">
        <video id="cutscene-video" src="output_1770230989195.mp4" loop muted playsinline></video>
    </div>
</div>

<div id="ui-layer">
    <div id="msg-box">
        <div id="speaker"></div><div id="text"></div><div id="choices" style="margin-top:20px;"></div>
    </div>
</div>

<div id="bad-end" class="end-screen"><div class="end-text" id="bad-text">GAMEOVER</div><button class="btn-ui" onclick="location.reload()" style="margin-top:40px;">再試行</button></div>
<div id="good-end" class="end-screen"><div class="end-text">第一章 完結</div><button class="btn-ui" onclick="location.reload()" style="margin-top:40px;">タイトルへ戻る</button></div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let mode = 'WAIT';
let walkCount = 0;
const state = { sanity: 100, hasKey: false, player: {x:0, y:0}, enemies: [] };

function initGame() {
    document.getElementById('start-screen').style.display = 'none';
    mode = 'INTRO';
    document.getElementById('msg-box').style.display = 'block';
    renderMessage("主人公", "逃げなきゃ……黄色い「鍵」を拾って、下の「非常口」へ！");
}

document.getElementById('msg-box').onclick = (e) => {
    if(e.target.tagName === 'BUTTON') return;
    if(mode === 'INTRO') startBattle();
};

function startBattle() {
    mode = 'BATTLE';
    document.getElementById('msg-box').style.display = 'none';
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    state.key = { x: Math.random() * (canvas.width-40) + 20, y: Math.random() * (canvas.height-100) + 50 };
    for(let i=0; i<6; i++) state.enemies.push({x: Math.random()*canvas.width, y: -50, speed: 1.5 + Math.random()});
    requestAnimationFrame(loop);
}

window.onmousemove = (e) => { state.player.x = e.clientX; state.player.y = e.clientY; };

function loop() {
    if(mode !== 'BATTLE') return;
    ctx.fillStyle = '#0a0a0c';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    if(!state.hasKey) {
        ctx.fillStyle = '#ff0';
        ctx.beginPath(); ctx.arc(state.key.x, state.key.y, 8, 0, Math.PI*2); ctx.fill();
        if(Math.hypot(state.player.x-state.key.x, state.player.y-state.key.y) < 30) state.hasKey = true;
    }
    ctx.fillStyle = state.hasKey ? '#00ff44' : '#222';
    ctx.fillRect(0, canvas.height-15, canvas.width, 15);
    state.enemies.forEach(e => {
        let dx = state.player.x - e.x, dy = state.player.y - e.y, d = Math.hypot(dx, dy);
        e.x += (dx/d)*e.speed; e.y += (dy/d)*e.speed;
        ctx.fillStyle = 'red'; ctx.fillRect(e.x-4, e.y-4, 8, 8);
        if(d < 40) state.sanity -= 0.6;
    });
    if(state.sanity <= 0) location.reload();
    if(state.hasKey && state.player.y > canvas.height - 40) startWalkPhase();
    else requestAnimationFrame(loop);
}

function startWalkPhase() {
    mode = 'WALK_READY';
    walkCount = 0;
    const scene = document.getElementById('escape-scene');
    scene.style.display = 'block';
    document.getElementById('msg-box').style.display = 'block';
    updateWalkUI();
}

function updateWalkUI() {
    let msg = walkCount === 0 ? "はぁ、はぁ……外だ。ここから離れないと。" : `（影が動いたような…… ${walkCount}/4）`;
    renderMessage("主人公", msg);
    document.getElementById('choices').innerHTML = `<button class="btn-ui" onclick="handleWalk()">前へ進む</button>`;
}

function handleWalk() {
    const scene = document.getElementById('escape-scene');
    const shakeLayer = document.getElementById('shake-layer');
    const video = document.getElementById('cutscene-video');
    walkCount++;

    scene.style.transform = `scale(${1 + (walkCount * 0.25)})`;
    shakeLayer.classList.remove('step-shake');
    void shakeLayer.offsetWidth; 
    shakeLayer.classList.add('step-shake');

    if(walkCount === 3) {
        video.style.display = 'block';
        video.play();
        // 0.6 (60%) に設定
        setTimeout(() => { video.style.opacity = '0.6'; }, 50);
    }

    if(walkCount >= 4) startOutro();
    else updateWalkUI();
}

function startOutro() {
    mode = 'OUTRO';
    document.getElementById('choices').innerHTML = "";
    renderMessage("？？？", "こっちだ。早くしろ！", true);
}

function renderMessage(s, t, isChoice = false) {
    document.getElementById('speaker').innerText = s;
    document.getElementById('text').innerText = t;
    if(isChoice) {
        document.getElementById('choices').innerHTML = 
            `<button class="btn-ui" onclick="makeChoice('A')">路地裏へ逃げ込む</button>
             <button class="btn-ui" onclick="makeChoice('B')">大通りへ走り出す</button>`;
    }
}

function makeChoice(type) {
    const img = document.getElementById('road-img');
    const video = document.getElementById('cutscene-video');
    const shakeLayer = document.getElementById('shake-layer');
    const scene = document.getElementById('escape-scene');

    if(type === 'B') {
        video.style.display = 'none';
        img.src = "Gemini_Generated_Image_5oalm5oalm5oalm5.png"; 
        
        // 超ズーム（2.3倍）
        scene.style.transition = "none"; 
        scene.style.transform = "scale(2.3)"; 
        img.style.objectPosition = "top center"; 
        
        shakeLayer.classList.remove('step-shake');
        shakeLayer.classList.add('violent-shake');
        
        renderMessage("主人公", "ぎゃあああああッ！！");
        setTimeout(() => triggerEnd('bad-end'), 2000);
    } else {
        renderMessage("主人公", "……信じるしかない！");
        setTimeout(() => triggerEnd('good-end'), 2000);
    }
}

function triggerEnd(id) {
    const endEl = document.getElementById(id);
    endEl.style.display = 'flex';
    setTimeout(() => { endEl.style.opacity = '1'; }, 100);
}
</script>
</body>
</html>
